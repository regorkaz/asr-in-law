services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  asr_worker:
    build:
      context: ./asr_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MOCK_MODE=true
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  speaker_worker:
    build:
      context: ./speaker_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MOCK_MODE=true
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN}
      - ENROLLMENT_DIR=/data/input/voices
    volumes:
      - ./data/input/voices:/data/input/voices:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
