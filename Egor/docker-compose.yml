services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  asr_worker:
    build:
      context: ./asr_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  speaker_worker:
    build:
      context: ./speaker_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HF_TOKEN=${HF_TOKEN}
      - ENROLLMENT_DIR=/data/input/voices
    volumes:
      - ./data:/data:ro
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  webgateway:
    build:
      context: .
      dockerfile: ./webgateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
