# Production overlay — adds GPU reservations.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  asr_worker:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  speaker_worker:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
